<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nike — קטלוג</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Heebo',system-ui,sans-serif;background:#faf9f7;color:#17140f}
  .hdr{background:#17140f;color:#fff;padding:14px 18px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
  .hdr b{font-size:16px;font-weight:800}
  .cartBtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-width:1100px;margin:0 auto 90px}
  .card{background:#fff;border:1px solid #ece8e2;border-radius:12px;overflow:hidden}
  .card.hasqty{border-color:#E2480F}
  .card img{width:100%;height:110px;object-fit:contain;background:#f2efea;display:block}
  .cbody{padding:8px}
  .name{font-size:11px;font-weight:700;line-height:1.2;min-height:27px}
  .sku{font-size:9px;color:#a8a29a;margin:2px 0 5px}
  .price{font-size:13px;font-weight:800;color:#E2480F;margin-bottom:6px}
  .sizerow{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:11px}
  .sizerow .lbl{width:28px;font-weight:700}
  .sizerow .st{color:#a8a29a;width:24px}
  .stepbtn{width:19px;height:19px;border:1px solid #ddd;border-radius:5px;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
  .qty{min-width:15px;text-align:center;font-weight:700}
  .qty.on{color:#E2480F}
  .inCart{margin-top:6px;font-size:10px;font-weight:700;color:#E2480F;text-align:center;min-height:13px}
  .fab{position:fixed;bottom:16px;left:16px;right:16px;background:#17140f;color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:20;transition:background .2s}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;display:none}
  .overlay.open{display:block}
  .cartPanel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;max-height:80vh;overflow-y:auto;z-index:31;transform:translateY(100%);transition:transform .25s;padding:18px}
  .cartPanel.open{transform:translateY(0)}
  .cline{border-bottom:1px solid #f1eee9;padding:8px 0;font-size:12px}
  .cline .sumrow{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .cline .ctrl{display:flex;align-items:center;gap:6px}
  .cline .sizes{display:none;margin-top:8px;padding-right:8px;border-right:2px solid #ece8e2}
  .cline.open .sizes{display:block}
  .cline .sizerow2{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0}
  .rm{background:none;border:none;color:#c33;font-size:16px;cursor:pointer}
  .total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;padding-top:12px;margin-top:6px;border-top:2px solid #17140f}
  .send{width:100%;margin-top:14px;padding:12px;background:#25D366;color:#fff;border:none;border-radius:9px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit}
  .empty{color:#a8a29a;font-size:12px;text-align:center;padding:20px 0}
</style>
</head>
<body>
  <div class="hdr"><b>Nike — קטלוג</b><button class="cartBtn" id="openCartTop">🛒 <span id="cartCountTop">0</span></button></div>
  <div style="padding:12px 14px 0;max-width:1100px;margin:0 auto"><input id="searchBox" type="text" placeholder="חיפוש לפי שם מוצר..." style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:9px;font-size:13px;font-family:inherit;box-sizing:border-box"></div>
  <div class="grid" id="grid"></div>
  <button class="fab" id="openCartBottom">צפייה בעגלה (<span id="cartCountBottom">0</span> פריטים)</button>

  <div class="overlay" id="overlay"></div>
  <div class="cartPanel" id="cartPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><b style="font-size:15px">העגלה שלי</b><button onclick="closeCart()" style="background:none;border:none;font-size:18px;cursor:pointer">✕</button></div>
    <div id="cartLines"></div>
    <div class="total"><span>סה"כ</span><span id="cartTotalTxt">₪0</span></div>
    <button class="send" id="sendBtn">שלח הזמנה בוואטסאפ</button>

  var WA_NUMBER = '972547973415';
  var cart = [];   // {pid, sizeIdx, qty}
  var grid = document.getElementById('grid');

  // --- sort sizes small -> large (handles plain numbers, half/third fractions, ranges like "5-6", and S/M/L) ---
  var APPAREL = ['XXS','XS','S','M','L','XL','XXL','XXXL','2XL','3XL'];
  var FRACS = {'⅓':1/3,'⅔':2/3,'½':1/2,'⅕':.2,'⅖':.4,'⅗':.6,'⅘':.8,'⅙':1/6,'⅚':5/6,'⅛':.125,'⅜':.375,'⅝':.625,'⅞':.875};
  function sizeKey(label){
    var s = String(label).trim();
    var up = s.toUpperCase();
    var ai = APPAREL.indexOf(up);
    if (ai >= 0) return 10000 + ai;
    var range = s.match(/^(\d+(\.\d+)?)\s*-\s*\d+/);
    if (range) return parseFloat(range[1]);
    var frac = s.match(/^(\d+(\.\d+)?)([⅓⅔½⅕⅖⅗⅘⅙⅚⅛⅜⅝⅞]?)$/);
    if (frac) return parseFloat(frac[1]) + (frac[3] ? (FRACS[frac[3]]||0) : 0);
    var num = parseFloat(s.replace(',', '.'));
    if (!isNaN(num) && /^[\d.,]+$/.test(s)) return num;
    return 99999;
  }
  DATA.products.forEach(function(p){ p.sizes.sort(function(a,b){ return sizeKey(a.s) - sizeKey(b.s); }); });

  function getCartQty(pid, si){ var c = cart.find(function(x){return x.pid==pid && x.sizeIdx==si;}); return c ? c.qty : 0; }

  function setCartQty(pid, si, qty){
    var p = DATA.products[pid];
    qty = Math.max(0, Math.min(p.sizes[si].st, qty));
    var c = cart.find(function(x){return x.pid==pid && x.sizeIdx==si;});
    if (qty === 0) { if (c) cart = cart.filter(function(x){return x!==c;}); }
    else if (c) { c.qty = qty; }
    else { cart.push({pid:pid, sizeIdx:si, qty:qty}); }
    var el = document.getElementById('q-'+pid+'-'+si);
    if (el) { el.textContent = qty; el.className = 'qty' + (qty>0 ? ' on' : ''); }
    updateCardBadge(pid);
    renderCart();
  }

  function updateCardBadge(pid){
    var p = DATA.products[pid];
    var total = 0;
    for (var si=0; si<p.sizes.length; si++) total += getCartQty(pid, si);
    var card = grid.querySelector('.card[data-pid="'+pid+'"]');
    if (!card) return;
    card.classList.toggle('hasqty', total>0);
    var badge = card.querySelector('.inCart');
    if (badge) badge.textContent = total>0 ? ('בעגלה: '+total+' יח׳') : '';
  }

  DATA.products.forEach(function(p, pi){
    var card = document.createElement('div'); card.className='card'; card.dataset.pid = pi;
    var img = document.createElement('img'); img.src = p.img; card.appendChild(img);
    var body = document.createElement('div'); body.className='cbody';
    body.innerHTML = '<div class="name">'+p.name+'</div><div class="sku">'+p.sku+'</div><div class="price">'+(p.sym||'₪')+p.basePrice+'</div>';
    p.sizes.forEach(function(s, si){
      var row = document.createElement('div'); row.className='sizerow';
      row.innerHTML = '<span class="lbl">'+s.s+'</span><span class="st">('+s.st+')</span>' +
        '<button class="stepbtn" data-act="dec" data-p="'+pi+'" data-s="'+si+'">−</button>' +
        '<span class="qty" id="q-'+pi+'-'+si+'">0</span>' +
        '<button class="stepbtn" data-act="inc" data-p="'+pi+'" data-s="'+si+'">+</button>';
      body.appendChild(row);
    });
    var badge = document.createElement('div'); badge.className='inCart';
    body.appendChild(badge);
    card.appendChild(body); grid.appendChild(card);
    card.dataset.searchtext = (p.name + ' ' + p.sku).toLowerCase();
  });

  document.getElementById('searchBox').addEventListener('input', function(e){
    var q = e.target.value.trim().toLowerCase();
    grid.querySelectorAll('.card').forEach(function(card){
      card.style.display = !q || card.dataset.searchtext.indexOf(q) >= 0 ? '' : 'none';
    });
  });

  grid.addEventListener('click', function(e){
    var t = e.target;
    if (!t.dataset.act) return;
    var pi = t.dataset.p, si = t.dataset.s;
    var cur = getCartQty(pi, si);
    setCartQty(pi, si, t.dataset.act === 'inc' ? cur+1 : cur-1);
  });

  function renderCart(){
    var count = cart.reduce(function(a,c){return a+c.qty;}, 0);
    document.getElementById('cartCountTop').textContent = count;
    document.getElementById('cartCountBottom').textContent = count;
    var linesEl = document.getElementById('cartLines');
    if (!cart.length) { linesEl.innerHTML = '<div class="empty">העגלה ריקה</div>'; document.getElementById('cartTotalTxt').textContent='₪0'; return; }
    var total = 0;
    var byPid = {};
    cart.forEach(function(c){ if(!byPid[c.pid]) byPid[c.pid]=[]; byPid[c.pid].push(c); });
    linesEl.innerHTML = Object.keys(byPid).map(function(pid){
      var group = byPid[pid]; var p = DATA.products[pid];
      var groupQty = group.reduce(function(a,c){return a+c.qty;},0);
      var groupTotal = group.reduce(function(a,c){return a+c.qty*p.basePrice;},0);
      total += groupTotal;
      var sizesHtml = group.map(function(c){
        var s = p.sizes[c.sizeIdx];
        return '<div class="sizerow2"><span>מידה '+s.s+'</span><div class="ctrl">' +
          '<button class="stepbtn" data-pid="'+pid+'" data-si="'+c.sizeIdx+'" data-cact="dec">−</button><b>'+c.qty+'</b><button class="stepbtn" data-pid="'+pid+'" data-si="'+c.sizeIdx+'" data-cact="inc">+</button>' +
          '<button class="rm" data-pid="'+pid+'" data-si="'+c.sizeIdx+'" data-cact="rm">✕</button></div></div>';
      }).join('');
      return '<div class="cline" data-pid="'+pid+'">' +
        '<div class="sumrow" data-toggle="'+pid+'"><div><b>'+p.sku+'</b><div style="font-size:10px;color:#a8a29a">'+p.name+'</div></div>' +
        '<div class="ctrl"><span>×'+groupQty+'</span><span style="min-width:56px;text-align:left;font-weight:700">'+(p.sym||'₪')+groupTotal+'</span><span style="font-size:10px;color:#a8a29a">▾</span></div></div>' +
        '<div class="sizes">'+sizesHtml+'</div></div>';
    }).join('');
    document.getElementById('cartTotalTxt').textContent = '₪'+total;
  }
  document.getElementById('cartLines').addEventListener('click', function(e){
    var t = e.target;
    if (t.dataset.toggle != null) { t.closest('.cline').classList.toggle('open'); return; }
    if (!t.dataset.cact) return;
    var pid = t.dataset.pid, si = t.dataset.si;
    var cur = getCartQty(pid, si);
    if (t.dataset.cact === 'inc') setCartQty(pid, si, cur+1);
    else if (t.dataset.cact === 'dec') setCartQty(pid, si, cur-1);
    else if (t.dataset.cact === 'rm') setCartQty(pid, si, 0);
  });

  function openCart(){ document.getElementById('overlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); }
  function closeCart(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); }
  document.getElementById('openCartTop').onclick = openCart;
  document.getElementById('openCartBottom').onclick = openCart;

    var lines = [], total = 0;

      lines.push('• '+p.name+' | מידה '+s.s+' ×'+c.qty+' — '+(p.sym||'₪')+lt);

    });
    csvRows.push(['','','','','סה"כ', total]);
    var csv = csvRows.map(function(r){ return r.map(function(v){ v = String(v==null?'':v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }).join(','); }).join('\r\n');
    var csvBlob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
    var csvUrl = URL.createObjectURL(csvBlob);
    var dl = document.createElement('a'); dl.href = csvUrl; dl.download = 'הזמנה_'+DATA.brandName.replace(/\s+/g,'_')+'.csv'; document.body.appendChild(dl); dl.click(); dl.remove();
    var txt = 'הזמנה מקטלוג '+DATA.brandName+'\\n\\n'+lines.join('\\n')+'\\n\\nסה"כ: ₪'+total+'\\n\\n📎 מצורף קובץ אקסל מסודר (מק"ט/מידה/כמות) — הורד עכשיו למכשיר, נא לצרף אותו כאן בוואטסאפ.';
    setTimeout(function(){ window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(txt), '_blank'); }, 400);
  };

  renderCart();
</script>
